<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Salesforce — iOS Assessment</title>
<style>
  :root {
    --sf-blue: #0176D3;
    --sf-blue-dark: #032D60;
    --bg: #f3f3f3;
    --card: #ffffff;
    --primary: #0176D3;
    --primary-dark: #032D60;
    --text: #181818;
    --muted: #5c5c5c;
    --border: rgba(0,0,0,0.12);
    --correct-bg: #e3f6ea;
    --correct-border: #2e844a;
    --wrong-bg: #fde7e9;
    --wrong-border: #ba0517;
    --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Salesforce Sans', Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    padding: 0 0 80px;
  }
  .topbar {
    background: #fff;
    padding: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-bottom: 1px solid var(--border);
  }
  .topbar img { height: 44px; width: auto; }
  .container { max-width: 740px; margin: 0 auto; padding: 28px 16px 0; }
  header.intro {
    text-align: center;
    margin-bottom: 24px;
  }
  header.intro h1 { font-size: 26px; font-weight: 700; color: var(--sf-blue-dark); }
  .progress-wrap {
    position: sticky;
    top: 0;
    background: var(--bg);
    padding: 12px 0;
    margin-bottom: 8px;
    z-index: 10;
  }
  .progress-bar {
    height: 8px;
    background: rgba(0,0,0,0.08);
    border-radius: 4px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--primary);
    width: 0%;
    transition: width 0.3s ease;
  }
  .progress-text { font-size: 13px; color: var(--muted); margin-top: 6px; text-align: center; }
  .question {
    background: var(--card);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 22px 24px;
    margin-bottom: 18px;
  }
  .q-num {
    display: inline-block;
    background: var(--primary);
    color: #fff;
    font-size: 13px;
    font-weight: 600;
    padding: 3px 12px;
    border-radius: 20px;
    margin-bottom: 12px;
  }
  .q-text { font-size: 17px; font-weight: 500; margin-bottom: 16px; }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .option {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 13px 16px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    font-size: 15px;
    transition: all 0.15s ease;
    background: #fff;
  }
  .option:hover { border-color: var(--primary); background: #f3f9ff; }
  .option .letter {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 600;
    flex-shrink: 0;
    color: var(--muted);
  }
  .option.selected {
    border-color: var(--primary);
    background: #e8f3ff;
  }
  .option.selected .letter {
    background: var(--primary);
    color: #fff;
    border-color: var(--primary);
  }
  .submit-btn {
    width: 100%;
    padding: 16px;
    background: var(--primary);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    font-size: 17px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 10px;
    transition: background 0.2s ease;
    font-family: inherit;
  }
  .submit-btn:hover { background: var(--primary-dark); }
  .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .option.review { cursor: default; pointer-events: none; }
  .option.review.correct-ans {
    border-color: var(--correct-border);
    background: var(--correct-bg);
  }
  .option.review.correct-ans .letter {
    background: var(--correct-border);
    color: #fff;
    border-color: var(--correct-border);
  }
  .option.review.wrong-ans {
    border-color: var(--wrong-border);
    background: var(--wrong-bg);
  }
  .option.review.wrong-ans .letter {
    background: var(--wrong-border);
    color: #fff;
    border-color: var(--wrong-border);
  }
  .tag {
    margin-left: auto;
    font-size: 12px;
    font-weight: 600;
    padding: 2px 10px;
    border-radius: 12px;
    white-space: nowrap;
  }
  .tag.ok { background: var(--correct-border); color: #fff; }
  .tag.no { background: var(--wrong-border); color: #fff; }
  .scorecard {
    background: var(--card);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 32px 24px;
    text-align: center;
    margin-bottom: 24px;
  }
  .score-big { font-size: 52px; font-weight: 700; color: var(--primary); }
  .score-label { font-size: 16px; color: var(--muted); margin-top: 4px; }
  .score-msg { font-size: 17px; font-weight: 500; margin-top: 14px; color: var(--sf-blue-dark); }
  .restart {
    background: none;
    border: 1.5px solid var(--border);
    color: var(--text);
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
    margin-top: 16px;
    font-family: inherit;
  }
  .restart:hover { border-color: var(--primary); }
</style>
</head>
<body>
<div class="topbar">
  <img src="https://a.sfdcstatic.com/shared/images/c360-nav/salesforce-with-type-logo.svg" alt="Salesforce">
</div>

<div class="container">
  <header class="intro">
    <h1>iOS Technical Assessment</h1>
  </header>

  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
    <div class="progress-text" id="progress-text">0 of 15 answered</div>
  </div>

  <div id="quiz"></div>

  <button class="submit-btn" id="submit" disabled>Finish and view result</button>
</div>

<script>
const rawQuestions = [
  {
    q: "Which framework did Apple introduce to replace Combine in many modern async flows?",
    options: ["GCD (Grand Central Dispatch)", "async/await (Swift Concurrency)", "RxSwift", "OperationQueue"],
    correctText: "async/await (Swift Concurrency)"
  },
  {
    q: "In SwiftUI, which macro replaces ObservableObject + @Published starting with iOS 17?",
    options: ["@Observable", "@StateObject", "@Bindable", "@MainActor"],
    correctText: "@Observable"
  },
  {
    q: "Which visual effect did iOS 26 introduce as a new design language?",
    options: ["Material Design", "Neumorphism", "Liquid Glass", "Frosted UI"],
    correctText: "Liquid Glass"
  },
  {
    q: "What is the @MainActor attribute used for in Swift Concurrency?",
    options: ["Speed up background tasks", "Create a new thread", "Pause the app", "Ensure code runs on the main thread"],
    correctText: "Ensure code runs on the main thread"
  },
  {
    q: "Which framework replaced Core Data as the modern persistence API in Swift?",
    options: ["SwiftData", "Realm", "UserDefaults", "FileManager"],
    correctText: "SwiftData"
  },
  {
    q: "In SwiftUI, which property wrapper do you use to pass data to a child view with two-way editing using @Observable?",
    options: ["@State", "@Environment", "@Bindable", "@Published"],
    correctText: "@Bindable"
  },
  {
    q: "Which Xcode tool lets you preview SwiftUI views in real time with the #Preview macro?",
    options: ["Instruments", "Simulator", "Playgrounds", "Canvas / Previews"],
    correctText: "Canvas / Previews"
  },
  {
    q: "What issue does Main Thread Checker detect?",
    options: ["Retain cycles", "UI updates off the main thread", "Memory leaks", "Crashes from force unwrap"],
    correctText: "UI updates off the main thread"
  },
  {
    q: "Which protocol marks a type that can safely cross concurrency boundaries?",
    options: ["Codable", "Equatable", "Sendable", "Hashable"],
    correctText: "Sendable"
  },
  {
    q: "Which Apple framework lets you integrate machine learning models into iOS apps?",
    options: ["TensorFlow", "Core ML", "PyTorch", "Keras"],
    correctText: "Core ML"
  },
  {
    q: "What is the key difference between 'struct' and 'class' in Swift?",
    options: ["struct is reference type, class is value type", "struct is value type, class is reference type", "There is no difference", "class does not support methods"],
    correctText: "struct is value type, class is reference type"
  },
  {
    q: "What is the 'weak' keyword used for in a reference?",
    options: ["Speed up memory access", "Avoid retain cycles", "Make the property immutable", "Run in background"],
    correctText: "Avoid retain cycles"
  },
  {
    q: "What is an 'optional' in Swift?",
    options: ["A type that can hold a value or nil", "An optional function parameter", "A global variable", "A type that is never nil"],
    correctText: "A type that can hold a value or nil"
  },
  {
    q: "In SwiftUI, which property wrapper creates and owns the lifecycle of an observable object in a view?",
    options: ["@ObservedObject", "@StateObject", "@Binding", "@EnvironmentObject"],
    correctText: "@StateObject"
  },
  {
    q: "Which Xcode tool is used to detect memory leaks and performance issues?",
    options: ["SwiftLint", "Instruments", "Console", "Build Settings"],
    correctText: "Instruments"
  }
];

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

const questions = rawQuestions.map(item => {
  const shuffled = shuffle(item.options);
  return {
    q: item.q,
    options: shuffled,
    correct: shuffled.indexOf(item.correctText)
  };
});

const letters = ["A", "B", "C", "D"];
const answers = new Array(questions.length).fill(null);
let submitted = false;

const quizEl = document.getElementById("quiz");
const submitBtn = document.getElementById("submit");
const progressEl = document.getElementById("progress");
const progressText = document.getElementById("progress-text");

function render() {
  quizEl.innerHTML = "";
  questions.forEach((item, qi) => {
    const card = document.createElement("div");
    card.className = "question";

    const num = document.createElement("span");
    num.className = "q-num";
    num.textContent = "Question " + (qi + 1);
    card.appendChild(num);

    const qt = document.createElement("div");
    qt.className = "q-text";
    qt.textContent = item.q;
    card.appendChild(qt);

    const opts = document.createElement("div");
    opts.className = "options";

    item.options.forEach((opt, oi) => {
      const label = document.createElement("div");
      label.className = "option";
      if (answers[qi] === oi) label.classList.add("selected");

      if (submitted) {
        label.classList.add("review");
        if (oi === item.correct) label.classList.add("correct-ans");
        if (answers[qi] === oi && oi !== item.correct) label.classList.add("wrong-ans");
      }

      const letter = document.createElement("span");
      letter.className = "letter";
      letter.textContent = letters[oi];
      label.appendChild(letter);

      const txt = document.createElement("span");
      txt.textContent = opt;
      label.appendChild(txt);

      if (submitted) {
        if (oi === item.correct) {
          const tag = document.createElement("span");
          tag.className = "tag ok";
          tag.textContent = "Correct";
          label.appendChild(tag);
        } else if (answers[qi] === oi) {
          const tag = document.createElement("span");
          tag.className = "tag no";
          tag.textContent = "Your answer";
          label.appendChild(tag);
        }
      }

      if (!submitted) {
        label.addEventListener("click", () => {
          answers[qi] = oi;
          render();
          updateProgress();
        });
      }

      opts.appendChild(label);
    });

    card.appendChild(opts);
    quizEl.appendChild(card);
  });
}

function updateProgress() {
  const answered = answers.filter(a => a !== null).length;
  const pct = (answered / questions.length) * 100;
  progressEl.style.width = pct + "%";
  progressText.textContent = answered + " of " + questions.length + " answered";
  submitBtn.disabled = answered < questions.length;
}

submitBtn.addEventListener("click", () => {
  if (!submitted) {
    submitted = true;
    const score = answers.reduce((acc, a, i) => acc + (a === questions[i].correct ? 1 : 0), 0);

    let msg;
    if (score >= 12) msg = "Excellent — strong command of modern iOS";
    else if (score >= 9) msg = "Good — adequate knowledge for semi-senior";
    else if (score >= 6) msg = "Fair — some gaps to explore in interview";
    else msg = "Low — review modern iOS fundamentals";

    const card = document.createElement("div");
    card.className = "scorecard";
    card.innerHTML =
      '<div class="score-big">' + score + '/15</div>' +
      '<div class="score-label">correct answers</div>' +
      '<div class="score-msg">' + msg + '</div>' +
      '<button class="restart" onclick="location.reload()">Restart quiz</button>';

    quizEl.parentNode.insertBefore(card, quizEl);
    submitBtn.style.display = "none";
    render();
    window.scrollTo({ top: 0, behavior: "smooth" });
  }
});

render();
updateProgress();
</script>
</body>
</html>
